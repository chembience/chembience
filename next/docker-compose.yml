services:

  rdkit:
    image: chembience/rdkit:${CHEMBIENCE_VERSION}
    build:
      context: rdkit/
      args:
        conda_package: 'continuumio/miniconda3'
        conda_tag: '24.11.1-0'
        conda_py: '312'
        rdkit_version: 'Release_2024_09_5'
    environment:
      - CHEMBIENCE_UID=${CHEMBIENCE_UID:-1000}
      - CHEMBIENCE_GID=${CHEMBIENCE_GID:-1000}
    working_dir: "/home/app"
    networks:
      - app-network
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: [ "python" ]

  django:
    image: chembience/django:${CHEMBIENCE_VERSION}
    build:
      context: django/
      args:
        build_tag: ${CHEMBIENCE_VERSION}
    environment:
      - CHEMBIENCE_UID=${CHEMBIENCE_UID:-1000}
      - CHEMBIENCE_GID=${CHEMBIENCE_GID:-1000}
      - DJANGO_VIRTUAL_HOSTNAME=${APP_VIRTUAL_HOSTNAME:-localhost}
      - DJANGO_SUPERUSER_PASSWORD
      - DJANGO_SUPERUSER_USERNAME
      - DJANGO_SUPERUSER_EMAIL
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_NAME=${POSTGRES_NAME:-postgres}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
    ports:
      - "8000:8000"
      #- "8000:8000"
    volumes:
      - ~/app:/home/app
    networks:
      - app-network
    working_dir: "/home/app/"
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: ["gunicorn", "appsite.wsgi:application", "--bind", "0.0.0.0:8000"]

  postgres:
    image: postgres:17.2
    volumes:
      - postgres-db-volume:/var/lib/postgresql
      #- ${APP_HOME}/postgres-init.d:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_PASSWORD
      - POSTGRES_USER
    networks:
      - app-network
    #restart: always

volumes:
  postgres-db-volume:

networks:
  app-network:
    name: app-backend
  chembience-network:
    name: chembience-network